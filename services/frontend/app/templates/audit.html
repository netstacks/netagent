{% extends "base.html" %}

{% block title %}Audit Log - NetAgent{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h2 class="mb-1">Audit Log</h2>
        <p class="text-muted mb-0">Complete audit trail of all platform activity</p>
    </div>
    <div>
        <button class="btn btn-outline-secondary me-2" id="btn-export">
            <i class="bi bi-download"></i> Export
        </button>
        <button class="btn btn-outline-secondary" id="btn-refresh">
            <i class="bi bi-arrow-clockwise"></i> Refresh
        </button>
    </div>
</div>

<!-- Filters -->
<div class="card mb-4">
    <div class="card-body py-3">
        <div class="row g-3">
            <div class="col-md-3">
                <label class="form-label small">Category</label>
                <select class="form-select form-select-sm" id="filter-category">
                    <option value="">All Categories</option>
                    <option value="agent">Agent</option>
                    <option value="workflow">Workflow</option>
                    <option value="knowledge">Knowledge</option>
                    <option value="security">Security</option>
                    <option value="system">System</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label small">Action</label>
                <select class="form-select form-select-sm" id="filter-action">
                    <option value="">All Actions</option>
                    <option value="create">Create</option>
                    <option value="update">Update</option>
                    <option value="delete">Delete</option>
                    <option value="execute">Execute</option>
                    <option value="approve">Approve</option>
                    <option value="reject">Reject</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label small">User</label>
                <input type="text" class="form-control form-control-sm" id="filter-user"
                       placeholder="Search by email...">
            </div>
            <div class="col-md-3">
                <label class="form-label small">Date Range</label>
                <select class="form-select form-select-sm" id="filter-date">
                    <option value="1h">Last Hour</option>
                    <option value="24h" selected>Last 24 Hours</option>
                    <option value="7d">Last 7 Days</option>
                    <option value="30d">Last 30 Days</option>
                    <option value="all">All Time</option>
                </select>
            </div>
        </div>
    </div>
</div>

<!-- Audit Table -->
<div class="card">
    <div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead>
                <tr>
                    <th style="width: 180px;">Time</th>
                    <th>Event</th>
                    <th>User</th>
                    <th>Resource</th>
                    <th style="width: 50px;"></th>
                </tr>
            </thead>
            <tbody id="audit-table-body">
                <!-- Audit entries will be loaded here -->
            </tbody>
        </table>
    </div>
</div>

<!-- Pagination -->
<div class="d-flex justify-content-between align-items-center mt-3">
    <span class="text-muted" id="pagination-info">Showing 0-0 of 0</span>
    <nav>
        <ul class="pagination pagination-sm mb-0">
            <li class="page-item" id="prev-page">
                <a class="page-link" href="#"><i class="bi bi-chevron-left"></i></a>
            </li>
            <li class="page-item" id="next-page">
                <a class="page-link" href="#"><i class="bi bi-chevron-right"></i></a>
            </li>
        </ul>
    </nav>
</div>

<!-- Event Detail Modal -->
<div class="modal fade" id="eventModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Event Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="event-details">
                <!-- Details loaded dynamically -->
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let auditEntries = [];
let currentPage = 0;
let pageSize = 50;
let totalCount = 0;

document.addEventListener('DOMContentLoaded', function() {
    loadAuditLog();

    document.getElementById('btn-refresh').addEventListener('click', loadAuditLog);
    document.getElementById('btn-export').addEventListener('click', exportAudit);

    // Filter handlers
    document.getElementById('filter-category').addEventListener('change', loadAuditLog);
    document.getElementById('filter-action').addEventListener('change', loadAuditLog);
    document.getElementById('filter-date').addEventListener('change', loadAuditLog);
    document.getElementById('filter-user').addEventListener('input', debounce(loadAuditLog, 500));

    // Pagination
    document.getElementById('prev-page').addEventListener('click', function(e) {
        e.preventDefault();
        if (currentPage > 0) {
            currentPage--;
            loadAuditLog();
        }
    });

    document.getElementById('next-page').addEventListener('click', function(e) {
        e.preventDefault();
        if ((currentPage + 1) * pageSize < totalCount) {
            currentPage++;
            loadAuditLog();
        }
    });
});

async function loadAuditLog() {
    const category = document.getElementById('filter-category').value;
    const action = document.getElementById('filter-action').value;
    const user = document.getElementById('filter-user').value;
    const dateRange = document.getElementById('filter-date').value;

    const params = new URLSearchParams({
        limit: pageSize,
        offset: currentPage * pageSize
    });

    if (category) params.append('category', category);
    if (action) params.append('action', action);
    if (user) params.append('user_email', user);
    if (dateRange) params.append('date_range', dateRange);

    try {
        const response = await api.get(`/api/audit?${params.toString()}`);
        auditEntries = response.entries || [];
        totalCount = response.total || 0;
        renderAuditTable();
        updatePagination();
    } catch (error) {
        showToast('Failed to load audit log', 'error');
    }
}

function renderAuditTable() {
    const tbody = document.getElementById('audit-table-body');

    if (auditEntries.length === 0) {
        tbody.innerHTML = `
            <tr>
                <td colspan="5" class="text-center py-4 text-muted">No audit entries found</td>
            </tr>
        `;
        return;
    }

    tbody.innerHTML = auditEntries.map(entry => `
        <tr>
            <td>
                <span title="${new Date(entry.created_at).toLocaleString()}">
                    ${formatTimeAgo(entry.created_at)}
                </span>
            </td>
            <td>
                <span class="badge bg-${getCategoryColor(entry.event_category)} me-2">${entry.event_category}</span>
                <strong>${formatEventType(entry.event_type)}</strong>
            </td>
            <td>
                ${entry.user_email ? `
                    <span title="${entry.user_email}">
                        <i class="bi bi-person me-1"></i>${entry.user_email.split('@')[0]}
                    </span>
                ` : '<span class="text-muted">System</span>'}
            </td>
            <td>
                ${entry.resource_type ? `
                    <span class="text-muted">${entry.resource_type}:</span>
                    ${escapeHtml(entry.resource_name || `#${entry.resource_id}`)}
                ` : '-'}
            </td>
            <td>
                <button class="btn btn-link btn-sm p-0" onclick="viewEvent(${entry.id})">
                    <i class="bi bi-chevron-right"></i>
                </button>
            </td>
        </tr>
    `).join('');
}

function updatePagination() {
    const start = currentPage * pageSize + 1;
    const end = Math.min((currentPage + 1) * pageSize, totalCount);

    document.getElementById('pagination-info').textContent =
        `Showing ${totalCount > 0 ? start : 0}-${end} of ${totalCount}`;

    document.getElementById('prev-page').classList.toggle('disabled', currentPage === 0);
    document.getElementById('next-page').classList.toggle('disabled', end >= totalCount);
}

async function viewEvent(id) {
    const entry = auditEntries.find(e => e.id === id);
    if (!entry) return;

    document.getElementById('event-details').innerHTML = `
        <div class="row">
            <div class="col-md-6">
                <h6>Event Information</h6>
                <dl>
                    <dt>Event Type</dt>
                    <dd>${entry.event_type}</dd>
                    <dt>Category</dt>
                    <dd><span class="badge bg-${getCategoryColor(entry.event_category)}">${entry.event_category}</span></dd>
                    <dt>Action</dt>
                    <dd>${entry.action || '-'}</dd>
                    <dt>Time</dt>
                    <dd>${new Date(entry.created_at).toLocaleString()}</dd>
                </dl>
            </div>
            <div class="col-md-6">
                <h6>Actor</h6>
                <dl>
                    <dt>User</dt>
                    <dd>${entry.user_email || 'System'}</dd>
                    <dt>IP Address</dt>
                    <dd>${entry.ip_address || '-'}</dd>
                </dl>

                <h6 class="mt-4">Resource</h6>
                <dl>
                    <dt>Type</dt>
                    <dd>${entry.resource_type || '-'}</dd>
                    <dt>ID</dt>
                    <dd>${entry.resource_id || '-'}</dd>
                    <dt>Name</dt>
                    <dd>${escapeHtml(entry.resource_name) || '-'}</dd>
                </dl>
            </div>
        </div>

        ${entry.details ? `
            <h6 class="mt-4">Details</h6>
            <pre class="bg-dark text-light p-3 rounded"><code>${JSON.stringify(entry.details, null, 2)}</code></pre>
        ` : ''}

        ${entry.user_agent ? `
            <h6 class="mt-4">User Agent</h6>
            <small class="text-muted">${escapeHtml(entry.user_agent)}</small>
        ` : ''}
    `;

    new bootstrap.Modal(document.getElementById('eventModal')).show();
}

async function exportAudit() {
    // Get current filters
    const category = document.getElementById('filter-category').value;
    const action = document.getElementById('filter-action').value;
    const user = document.getElementById('filter-user').value;
    const dateRange = document.getElementById('filter-date').value;

    const params = new URLSearchParams({ format: 'csv' });
    if (category) params.append('category', category);
    if (action) params.append('action', action);
    if (user) params.append('user_email', user);
    if (dateRange) params.append('date_range', dateRange);

    window.location.href = `/api/audit/export?${params.toString()}`;
}

function getCategoryColor(category) {
    const colors = {
        'agent': 'primary',
        'workflow': 'info',
        'knowledge': 'success',
        'security': 'danger',
        'system': 'secondary'
    };
    return colors[category] || 'secondary';
}

function formatEventType(eventType) {
    return eventType.replace(/\./g, ' ').replace(/_/g, ' ');
}

function formatTimeAgo(dateString) {
    if (!dateString) return '-';
    const date = new Date(dateString);
    const now = new Date();
    const seconds = Math.floor((now - date) / 1000);

    if (seconds < 60) return 'Just now';
    if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
    if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`;
    return date.toLocaleDateString();
}

function debounce(func, wait) {
    let timeout;
    return function executedFunction(...args) {
        const later = () => {
            clearTimeout(timeout);
            func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
    };
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>
{% endblock %}
